              <script>
                              // ==========================================
// TOKE KELONTONG - GOOGLE SHEETS API
// ==========================================
const PRODUCT_SHEET = "Products";
const TRANSACTION_SHEET = "Transactions";

function doGet(e) { return handleRequest(e); }
function doPost(e) { return handleRequest(e); }

function handleRequest(e) {
  const lock = LockService.getScriptLock();
  lock.waitLock(10000);
  
  try {
    // Parse request body (menghindari CORS preflight)
    const raw = e.postData ? e.postData.contents : (e.parameter?.data || "{}");
    const body = JSON.parse(raw);
    const action = body.action;
    const data = body.data || {};
    let result = { success: false, error: "Action tidak dikenal" };

    switch (action) {
      case "getProducts":    result = getProducts(); break;
      case "addProduct":     result = addProduct(data); break;
      case "updateProduct":  result = updateProduct(data); break;
      case "deleteProduct":  result = deleteProduct(data); break;
      case "updateStock":    result = updateStock(data); break;
      case "getTransactions":result = getTransactions(); break;
      case "addTransaction": result = addTransaction(data); break;
    }
    return ContentService.createTextOutput(JSON.stringify(result))
      .setMimeType(ContentService.MimeType.JSON);
      
  } catch (err) {
    return ContentService.createTextOutput(JSON.stringify({ success: false, error: err.toString() }))
      .setMimeType(ContentService.MimeType.JSON);
  } finally {
    lock.releaseLock();
  }
}

// Helper: Ambil atau buat sheet otomatis
function getSheet(name) {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  let sheet = ss.getSheetByName(name);
  if (!sheet) {
    sheet = ss.insertSheet(name);
    if (name === PRODUCT_SHEET) sheet.appendRow(["id","name","category","unit","buyPrice","sellPrice","stock","image"]);
    if (name === TRANSACTION_SHEET) sheet.appendRow(["id","date","items","total","cashPaid","change","paymentMethod"]);
  }
  return sheet;
}

// ================= PRODUCTS =================
function getProducts() {
  const sheet = getSheet(PRODUCT_SHEET);
  const rows = sheet.getDataRange().getValues();
  if (rows.length <= 1) return { success: true,  [] };
  
  const products = [];
  for (let i = 1; i < rows.length; i++) {
    products.push({
      id: rows[i][0], name: rows[i][1], category: rows[i][2], unit: rows[i][3],
      buyPrice: rows[i][4], sellPrice: rows[i][5], stock: rows[i][6], image: rows[i][7] || ""
    });
  }
  return { success: true,  products };
}

function addProduct(d) {
  const sheet = getSheet(PRODUCT_SHEET);
  sheet.appendRow([d.id, d.name, d.category, d.unit, d.buyPrice, d.sellPrice, d.stock, d.image || ""]);
  return { success: true, message: "Produk ditambahkan" };
}

function updateProduct(d) {
  const sheet = getSheet(PRODUCT_SHEET);
  const rows = sheet.getDataRange().getValues();
  for (let i = 1; i < rows.length; i++) {
    if (rows[i][0] == d.editId) {
      sheet.getRange(i + 1, 1, 1, 8).setValues([[d.editId, d.name, d.category, d.unit, d.buyPrice, d.sellPrice, d.stock, d.image || ""]]);
      return { success: true, message: "Produk diperbarui" };
    }
  }
  return { success: false, error: "ID produk tidak ditemukan" };
}

function deleteProduct(d) {
  const sheet = getSheet(PRODUCT_SHEET);
  const rows = sheet.getDataRange().getValues();
  for (let i = 1; i < rows.length; i++) {
    if (rows[i][0] == d.id) {
      sheet.deleteRow(i + 1);
      return { success: true, message: "Produk dihapus" };
    }
  }
  return { success: false, error: "ID produk tidak ditemukan" };
}

function updateStock(d) {
  const sheet = getSheet(PRODUCT_SHEET);
  const rows = sheet.getDataRange().getValues();
  for (let i = 1; i < rows.length; i++) {
    if (rows[i][0] == d.id) {
      sheet.getRange(i + 1, 7).setValue(d.stock);
      return { success: true };
    }
  }
  return { success: false, error: "ID produk tidak ditemukan" };
}

// ================= TRANSACTIONS =================
function getTransactions() {
  const sheet = getSheet(TRANSACTION_SHEET);
  const rows = sheet.getDataRange().getValues();
  if (rows.length <= 1) return { success: true,  [] };
  
  const txs = [];
  for (let i = 1; i < rows.length; i++) {
    txs.push({
      id: rows[i][0], date: rows[i][1], items: rows[i][2],
      total: rows[i][3], cashPaid: rows[i][4], change: rows[i][5], paymentMethod: rows[i][6] || "tunai"
    });
  }
  return { success: true,  txs };
}

function addTransaction(d) {
  const sheet = getSheet(TRANSACTION_SHEET);
  sheet.appendRow([d.id, d.date, JSON.stringify(d.items), d.total, d.cashPaid, d.change, d.paymentMethod]);
  return { success: true, message: "Transaksi disimpan" };
}
